name: JWT Auth CI

on:
  push:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

# ─────────────────────────────────────────────────────────────────────────────
# Shared .env content — used by both jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  SECRET_KEY: ci-test-secret-key-not-for-production
  DEBUG: "True"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  JWT_ACCESS_MINUTES: "15"
  JWT_REFRESH_DAYS: "7"
  JWT_ACCESS_COOKIE_NAME: "move_access_token"
  JWT_REFRESH_COOKIE_NAME: "move_refresh_token"
  JWT_COOKIE_SECURE: "False"
  JWT_COOKIE_SAMESITE: "Lax"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
  CSRF_TRUSTED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost"

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Unit tests (Python puro, sin Docker, muy rápido)
  # ───────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 Unit Tests (Python)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          JWT_ACCESS_MINUTES=15
          JWT_REFRESH_DAYS=7
          JWT_ACCESS_COOKIE_NAME=move_access_token
          JWT_REFRESH_COOKIE_NAME=move_refresh_token
          JWT_COOKIE_SECURE=False
          JWT_COOKIE_SAMESITE=Lax
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
          CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost
          EOF

      - name: Generate migrations
        run: python manage.py makemigrations --no-input

      - name: Apply migrations
        run: python manage.py migrate --no-input

      - name: "🔐 JWT Auth tests"
        run: |
          python manage.py test apps.authentication \
            --verbosity=2 \
            --failfast

      - name: "📦 Full test suite"
        run: python manage.py test --verbosity=1

      - name: Django system check
        run: python manage.py check 2>&1 || true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Integration tests (Docker Compose real + curl contra la API)
  # ───────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "🐳 Integration Tests (Docker)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Escribir .env para el contenedor ───────────────────────────────────
      - name: Write backend .env
        run: |
          cat > backend/.env <<'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          JWT_ACCESS_MINUTES=15
          JWT_REFRESH_DAYS=7
          JWT_ACCESS_COOKIE_NAME=move_access_token
          JWT_REFRESH_COOKIE_NAME=move_refresh_token
          JWT_COOKIE_SECURE=False
          JWT_COOKIE_SAMESITE=Lax
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
          CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost
          EOF

      # ── Levantar solo el backend (sin frontend) ───────────────────────────
      - name: Build and start backend container
        run: docker compose up -d --build backend

      # ── Esperar a que el healthcheck pase ─────────────────────────────────
      - name: Wait for backend to be healthy
        timeout-minutes: 3
        run: |
          echo "Waiting for backend healthcheck..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health/ || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is up!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Backend never became healthy"
              docker compose logs backend
              exit 1
            fi
            sleep 5
          done

      # ── Crear usuario de prueba en el contenedor ──────────────────────────
      - name: Create test user
        run: |
          docker compose exec -T backend python manage.py shell -c "
          from apps.users.models import User
          if not User.objects.filter(username='ciuser').exists():
              User.objects.create_user(username='ciuser', email='ci@example.com', password='ci-password-123')
              print('✅ Test user created')
          else:
              print('ℹ️  Test user already exists')
          "

      # ── Test 1: Healthcheck ───────────────────────────────────────────────
      - name: "Test 1 — GET /api/health/"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/health/)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status": "ok"' || \
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', 'health check failed'"
          echo "✅ Health check passed"

      # ── Test 2: Login ─────────────────────────────────────────────────────
      - name: "Test 2 — POST /api/auth/login/"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"ciuser","password":"ci-password-123"}' \
            -c /tmp/ci_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'user' in d, f'Missing user in response: {d}'
          assert d['user']['username'] == 'ciuser', f'Wrong username: {d}'
          print('✅ Login test passed')
          "
          # Verificar que las cookies existen
          grep -q "move_access_token" /tmp/ci_cookies.txt  && echo "✅ Access cookie set"
          grep -q "move_refresh_token" /tmp/ci_cookies.txt && echo "✅ Refresh cookie set"
          grep -q "HttpOnly" /tmp/ci_cookies.txt           && echo "✅ Cookies are HttpOnly"

      # ── Test 3: Me ────────────────────────────────────────────────────────
      - name: "Test 3 — GET /api/auth/me/"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/auth/me/ \
            -b /tmp/ci_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['username'] == 'ciuser', f'Wrong user: {d}'
          assert d['email'] == 'ci@example.com', f'Wrong email: {d}'
          print('✅ /me/ test passed')
          "

      # ── Test 4: Me sin cookie → 401 ───────────────────────────────────────
      - name: "Test 4 — GET /api/auth/me/ (sin cookie → debe ser 401)"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/auth/me/)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] && echo "✅ Unauthenticated request correctly rejected (401)" || \
            (echo "❌ Expected 401, got $HTTP_CODE" && exit 1)

      # ── Test 5: Refresh ───────────────────────────────────────────────────
      - name: "Test 5 — POST /api/auth/refresh/"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/refresh/ \
            -b /tmp/ci_cookies.txt \
            -c /tmp/ci_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'detail' in d, f'Unexpected response: {d}'
          print('✅ Refresh test passed')
          "

      # ── Test 6: Me después del refresh ────────────────────────────────────
      - name: "Test 6 — GET /api/auth/me/ (post-refresh)"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/auth/me/ \
            -b /tmp/ci_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['username'] == 'ciuser', f'User not authenticated after refresh: {d}'
          print('✅ Session still valid after refresh')
          "

      # ── Test 7: Login con email ───────────────────────────────────────────
      - name: "Test 7 — POST /api/auth/login/ (con email)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"ci@example.com","password":"ci-password-123"}' \
            -c /tmp/ci_cookies2.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['user']['username'] == 'ciuser', f'Email login failed: {d}'
          print('✅ Login with email passed')
          "

      # ── Test 8: Login con credenciales inválidas ──────────────────────────
      - name: "Test 8 — POST /api/auth/login/ (password incorrecto → 400)"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"ciuser","password":"wrongpass"}')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Invalid credentials correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── Test 9: Logout ────────────────────────────────────────────────────
      - name: "Test 9 — POST /api/auth/logout/"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/logout/ \
            -b /tmp/ci_cookies.txt \
            -c /tmp/ci_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'detail' in d, f'Unexpected response: {d}'
          print('✅ Logout test passed')
          "

      # ── Test 10: Me después del logout → 401 ──────────────────────────────
      - name: "Test 10 — GET /api/auth/me/ (post-logout → debe ser 401)"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/auth/me/ \
            -b /tmp/ci_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] && echo "✅ Session correctly invalidated after logout (401)" || \
            (echo "❌ Expected 401, got $HTTP_CODE" && exit 1)

      # ── Logs del contenedor si algo falló ─────────────────────────────────
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

      # ── Siempre apagar el contenedor al final ─────────────────────────────
      - name: Tear down containers
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Trips integration tests (Docker Compose real + curl)
  # Depende de integration-tests para reusar el mismo patrón probado.
  # ───────────────────────────────────────────────────────────────────────────
  trips-tests:
    name: "✈️  Trips Integration Tests (Docker)"
    runs-on: ubuntu-latest
    needs: [integration-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .env para el contenedor ────────────────────────────────────────────
      - name: Write backend .env
        run: |
          cat > backend/.env <<'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          JWT_ACCESS_MINUTES=15
          JWT_REFRESH_DAYS=7
          JWT_ACCESS_COOKIE_NAME=move_access_token
          JWT_REFRESH_COOKIE_NAME=move_refresh_token
          JWT_COOKIE_SECURE=False
          JWT_COOKIE_SAMESITE=Lax
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
          CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost
          EOF

      # ── Levantar backend ───────────────────────────────────────────────────
      - name: Build and start backend container
        run: docker compose up -d --build backend

      # ── Healthcheck ────────────────────────────────────────────────────────
      - name: Wait for backend to be healthy
        timeout-minutes: 3
        run: |
          echo "Waiting for backend healthcheck..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health/ || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is up!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Backend never became healthy"
              docker compose logs backend
              exit 1
            fi
            sleep 5
          done

      # ── Crear usuarios de prueba ───────────────────────────────────────────
      # organizer → será el dueño de los viajes
      # member    → será añadido como participante
      - name: Create test users (organizer + member)
        run: |
          docker compose exec -T backend python manage.py shell -c "
          from apps.users.models import User

          if not User.objects.filter(username='trip_organizer').exists():
              User.objects.create_user(
                  username='trip_organizer',
                  email='organizer@ci.test',
                  password='ci-password-123'
              )
              print('✅ trip_organizer created')
          else:
              print('ℹ️  trip_organizer already exists')

          if not User.objects.filter(username='trip_member').exists():
              User.objects.create_user(
                  username='trip_member',
                  email='member@ci.test',
                  password='ci-password-123'
              )
              print('✅ trip_member created')
          else:
              print('ℹ️  trip_member already exists')
          "

      # ── Login organizer → guarda cookies en /tmp/org_cookies.txt ──────────
      - name: "Trips T1 — Login as organizer"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"trip_organizer","password":"ci-password-123"}' \
            -c /tmp/org_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['user']['username'] == 'trip_organizer', f'Login failed: {d}'
          print('✅ Organizer login OK')
          "
          grep -q "move_access_token" /tmp/org_cookies.txt && echo "✅ Access cookie set"

      # ── Login member → guarda cookies en /tmp/mem_cookies.txt ─────────────
      - name: "Trips T2 — Login as member"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"trip_member","password":"ci-password-123"}' \
            -c /tmp/mem_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['user']['username'] == 'trip_member', f'Login failed: {d}'
          print('✅ Member login OK')
          "

      # ── Obtener el PK de trip_member para usarlo en participant_ids ────────
      - name: "Trips T3 — Resolve member PK"
        run: |
          MEMBER_PK=$(docker compose exec -T backend python manage.py shell -c "
          from apps.users.models import User
          print(User.objects.get(username='trip_member').pk)
          ")
          echo "MEMBER_PK=$MEMBER_PK" >> $GITHUB_ENV
          echo "✅ trip_member PK = $MEMBER_PK"

      # ── POST /api/trips/ → crear viaje donde organizer es owner ───────────
      - name: "Trips T4 — POST /api/trips/ (crear viaje con participante)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/trips/ \
            -H "Content-Type: application/json" \
            -b /tmp/org_cookies.txt \
            -d "{\"name\":\"CI Road Trip\",\"description\":\"Auto-generated by CI\",\"start_date\":\"2026-07-01\",\"end_date\":\"2026-07-10\",\"participant_ids\":[$MEMBER_PK]}")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'id'           in d, f'Missing id: {d}'
          assert 'organizer'    in d, f'Missing organizer: {d}'
          assert 'name'         in d, f'Missing name: {d}'
          assert 'description'  in d, f'Missing description: {d}'
          assert 'start_date'   in d, f'Missing start_date: {d}'
          assert 'end_date'     in d, f'Missing end_date: {d}'
          assert 'participants' in d, f'Missing participants: {d}'
          assert 'created_at'   in d, f'Missing created_at: {d}'
          assert 'updated_at'   in d, f'Missing updated_at: {d}'
          assert d['organizer'] == 'trip_organizer', f'Wrong organizer: {d}'
          assert d['name']      == 'CI Road Trip',   f'Wrong name: {d}'
          assert 'trip_member'  in d['participants'], f'Member not in participants: {d}'
          print(f\"✅ Trip created — id={d['id']}, organizer={d['organizer']}\")
          with open('/tmp/trip_id.txt', 'w') as f:
              f.write(str(d['id']))
          "

      # ── Leer el ID del viaje creado ────────────────────────────────────────
      - name: "Trips T5 — Store trip ID in env"
        run: |
          TRIP_ID=$(cat /tmp/trip_id.txt)
          echo "TRIP_ID=$TRIP_ID" >> $GITHUB_ENV
          echo "✅ TRIP_ID=$TRIP_ID"

      # ── GET /api/trips/ sin cookie → 401 ──────────────────────────────────
      - name: "Trips T6 — GET /api/trips/ sin cookie → 401"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/trips/)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] && echo "✅ Unauthenticated list correctly rejected (401)" || \
            (echo "❌ Expected 401, got $HTTP_CODE" && exit 1)

      # ── GET /api/trips/ como organizer → debe ver el viaje ────────────────
      - name: "Trips T7 — GET /api/trips/ como organizer"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/trips/ \
            -b /tmp/org_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          trips = json.load(sys.stdin)
          assert isinstance(trips, list), f'Expected list: {trips}'
          names = [t['name'] for t in trips]
          assert 'CI Road Trip' in names, f'Trip not in organizer list: {names}'
          print(f'✅ Organizer sees {len(trips)} trip(s), including CI Road Trip')
          "

      # ── GET /api/trips/ como member → debe ver el viaje ───────────────────
      - name: "Trips T8 — GET /api/trips/ como member"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/trips/ \
            -b /tmp/mem_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          trips = json.load(sys.stdin)
          names = [t['name'] for t in trips]
          assert 'CI Road Trip' in names, f'Member cannot see their trip: {names}'
          print('✅ Member correctly sees trips they participate in')
          "

      # ── GET /api/trips/<id>/ como organizer ───────────────────────────────
      - name: "Trips T9 — GET /api/trips/<id>/ como organizer"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/trips/$TRIP_ID/ \
            -b /tmp/org_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json, os
          d = json.load(sys.stdin)
          assert str(d['id']) == os.environ['TRIP_ID'], f'Wrong trip id: {d}'
          assert d['organizer']   == 'trip_organizer', f'Wrong organizer: {d}'
          assert d['name']        == 'CI Road Trip',   f'Wrong name: {d}'
          assert d['start_date']  == '2026-07-01',     f'Wrong start_date: {d}'
          assert d['end_date']    == '2026-07-10',     f'Wrong end_date: {d}'
          assert 'trip_member' in d['participants'],   f'Member missing: {d}'
          print('✅ Trip detail — all fields validated')
          "

      # ── GET /api/trips/<id>/ como member ──────────────────────────────────
      - name: "Trips T10 — GET /api/trips/<id>/ como member"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/trips/$TRIP_ID/ \
            -b /tmp/mem_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] && echo "✅ Member can read trip detail (200)" || \
            (echo "❌ Expected 200, got $HTTP_CODE" && exit 1)

      # ── GET /api/trips/<id>/ sin cookie → 401 ─────────────────────────────
      - name: "Trips T11 — GET /api/trips/<id>/ sin cookie → 401"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/trips/$TRIP_ID/)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] && echo "✅ Unauthenticated detail correctly rejected (401)" || \
            (echo "❌ Expected 401, got $HTTP_CODE" && exit 1)

      # ── PATCH /api/trips/<id>/ como organizer → 200 ───────────────────────
      - name: "Trips T12 — PATCH /api/trips/<id>/ como organizer → 200"
        run: |
          RESPONSE=$(curl -s -X PATCH http://localhost:8000/api/trips/$TRIP_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/org_cookies.txt \
            -d '{"name":"CI Road Trip (edited)"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['name'] == 'CI Road Trip (edited)', f'Update not applied: {d}'
          print('✅ Organizer PATCH OK — name updated')
          "

      # ── PATCH /api/trips/<id>/ como member → 403 ──────────────────────────
      - name: "Trips T13 — PATCH /api/trips/<id>/ como member → 403 Forbidden"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH http://localhost:8000/api/trips/$TRIP_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/mem_cookies.txt \
            -d '{"name":"Hijacked"}')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "403" ] && echo "✅ Member correctly blocked from editing (403)" || \
            (echo "❌ Expected 403, got $HTTP_CODE" && exit 1)

      # ── PUT /api/trips/<id>/ como organizer → 200 ─────────────────────────
      - name: "Trips T14 — PUT /api/trips/<id>/ como organizer → 200"
        run: |
          RESPONSE=$(curl -s -X PUT http://localhost:8000/api/trips/$TRIP_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/org_cookies.txt \
            -d "{\"name\":\"CI Road Trip (PUT)\",\"description\":\"Full update via PUT\",\"start_date\":\"2026-08-01\",\"end_date\":\"2026-08-05\",\"participant_ids\":[$MEMBER_PK]}")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['name']       == 'CI Road Trip (PUT)', f'PUT name wrong: {d}'
          assert d['start_date'] == '2026-08-01',         f'PUT start_date wrong: {d}'
          assert d['end_date']   == '2026-08-05',         f'PUT end_date wrong: {d}'
          print('✅ Organizer PUT OK — all fields updated')
          "

      # ── PUT /api/trips/<id>/ como member → 403 ────────────────────────────
      - name: "Trips T15 — PUT /api/trips/<id>/ como member → 403 Forbidden"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT http://localhost:8000/api/trips/$TRIP_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/mem_cookies.txt \
            -d '{"name":"Hijacked"}')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "403" ] && echo "✅ Member correctly blocked from PUT (403)" || \
            (echo "❌ Expected 403, got $HTTP_CODE" && exit 1)

      # ── Crear un segundo viaje propiedad del member (organizer no lo ve) ───
      - name: "Trips T16 — POST /api/trips/ como member (viaje propio)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/trips/ \
            -H "Content-Type: application/json" \
            -b /tmp/mem_cookies.txt \
            -d '{"name":"Member Only Trip","description":"Organizer should NOT see this"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['organizer'] == 'trip_member', f'Wrong organizer: {d}'
          print(f\"✅ Member's own trip created — id={d['id']}\")
          with open('/tmp/mem_trip_id.txt', 'w') as f:
              f.write(str(d['id']))
          "

      # ── GET /api/trips/ como organizer NO debe ver el viaje del member ─────
      - name: "Trips T17 — Organizer no debe ver viaje privado del member"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/trips/ \
            -b /tmp/org_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          trips = json.load(sys.stdin)
          names = [t['name'] for t in trips]
          assert 'Member Only Trip' not in names, f'Data leak — organizer sees member private trip: {names}'
          print('✅ No data leak — organizer cannot see member private trip')
          "

      # ── DELETE /api/trips/<id>/ como member → 403 ─────────────────────────
      - name: "Trips T18 — DELETE /api/trips/<id>/ como member → 403 Forbidden"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE http://localhost:8000/api/trips/$TRIP_ID/ \
            -b /tmp/mem_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "403" ] && echo "✅ Member correctly blocked from DELETE (403)" || \
            (echo "❌ Expected 403, got $HTTP_CODE" && exit 1)

      # ── DELETE /api/trips/<id>/ como organizer → 204 ──────────────────────
      - name: "Trips T19 — DELETE /api/trips/<id>/ como organizer → 204"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE http://localhost:8000/api/trips/$TRIP_ID/ \
            -b /tmp/org_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "204" ] && echo "✅ Organizer DELETE OK (204)" || \
            (echo "❌ Expected 204, got $HTTP_CODE" && exit 1)

      # ── Verificar que el viaje fue eliminado → 404 ─────────────────────────
      - name: "Trips T20 — GET viaje eliminado → 404"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/trips/$TRIP_ID/ \
            -b /tmp/org_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "404" ] && echo "✅ Deleted trip correctly returns 404" || \
            (echo "❌ Expected 404, got $HTTP_CODE" && exit 1)

      # ── Logs del contenedor si algo falló ─────────────────────────────────
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

      # ── Siempre apagar el contenedor al final ─────────────────────────────
      - name: Tear down containers
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Register integration tests (Docker Compose real + curl)
  # ───────────────────────────────────────────────────────────────────────────
  register-tests:
    name: "📝 Register Integration Tests (Docker)"
    runs-on: ubuntu-latest
    needs: [integration-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .env para el contenedor ────────────────────────────────────────────
      - name: Write backend .env
        run: |
          cat > backend/.env <<'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          JWT_ACCESS_MINUTES=15
          JWT_REFRESH_DAYS=7
          JWT_ACCESS_COOKIE_NAME=move_access_token
          JWT_REFRESH_COOKIE_NAME=move_refresh_token
          JWT_COOKIE_SECURE=False
          JWT_COOKIE_SAMESITE=Lax
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
          CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost
          EOF

      # ── Levantar backend ───────────────────────────────────────────────────
      - name: Build and start backend container
        run: docker compose up -d --build backend

      # ── Healthcheck ────────────────────────────────────────────────────────
      - name: Wait for backend to be healthy
        timeout-minutes: 3
        run: |
          echo "Waiting for backend healthcheck..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health/ || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is up!"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Backend never became healthy"
              docker compose logs backend
              exit 1
            fi
            sleep 5
          done

      # ── R1: Registro exitoso → 201 + cookies + campos correctos ───────────
      - name: "Register R1 — POST /api/auth/register/ (registro exitoso)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -c /tmp/reg_cookies.txt \
            -d '{
              "username": "reg_user",
              "email": "reg@ci.test",
              "password": "StrongPass123!",
              "password_confirm": "StrongPass123!"
            }')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'detail' in d,          f'Missing detail: {d}'
          assert 'user'   in d,          f'Missing user: {d}'
          assert d['user']['username'] == 'reg_user',   f'Wrong username: {d}'
          assert d['user']['email']    == 'reg@ci.test', f'Wrong email: {d}'
          assert 'password' not in d['user'],            f'Password leaked in response: {d}'
          print('✅ Register R1 — response body OK')
          "
          # Verificar cookies HTTP-only
          grep -q "move_access_token"  /tmp/reg_cookies.txt && echo "✅ Access cookie set"
          grep -q "move_refresh_token" /tmp/reg_cookies.txt && echo "✅ Refresh cookie set"
          grep -q "HttpOnly"           /tmp/reg_cookies.txt && echo "✅ Cookies are HttpOnly"

      # ── R2: Auto-login → cookies permiten acceder a /api/auth/me/ ───────
      - name: "Register R2 — Auto-login: /api/auth/me/ accesible tras registro"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/auth/me/ \
            -b /tmp/reg_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['username'] == 'reg_user', f'Wrong user in me: {d}'
          print('✅ Register R2 — auto-login OK, /me/ accessible')
          "

      # ── R3: /me/ sin cookie → 401 ───────────────────────────────────
      - name: "Register R3 — /api/auth/me/ sin cookie → 401"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/auth/me/)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] && echo "✅ Register R3 — unauthenticated correctly rejected (401)" || \
            (echo "❌ Expected 401, got $HTTP_CODE" && exit 1)

      # ── R4: Username duplicado → 400 ─────────────────────────────────
      - name: "Register R4 — username duplicado → 400"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "reg_user",
              "email": "other@ci.test",
              "password": "StrongPass123!",
              "password_confirm": "StrongPass123!"
            }')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Register R4 — duplicate username correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── R5: Email duplicado → 400 ──────────────────────────────────
      - name: "Register R5 — email duplicado → 400"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "other_user",
              "email": "reg@ci.test",
              "password": "StrongPass123!",
              "password_confirm": "StrongPass123!"
            }')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Register R5 — duplicate email correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── R6: Passwords no coinciden → 400 ────────────────────────────
      - name: "Register R6 — passwords no coinciden → 400"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "mismatch_user",
              "email": "mismatch@ci.test",
              "password": "StrongPass123!",
              "password_confirm": "DifferentPass!"
            }')
          echo "Response: $RESPONSE"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "mismatch_user2",
              "email": "mismatch2@ci.test",
              "password": "StrongPass123!",
              "password_confirm": "DifferentPass!"
            }')
          [ "$HTTP_CODE" = "400" ] && echo "✅ Register R6 — password mismatch correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── R7: Password débil → 400 ──────────────────────────────────
      - name: "Register R7 — password muy corto → 400"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "weak_user",
              "email": "weak@ci.test",
              "password": "abc",
              "password_confirm": "abc"
            }')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Register R7 — weak password correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── R8: Campos requeridos faltantes → 400 ────────────────────────
      - name: "Register R8 — payload incompleto (sin email) → 400"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "incomplete_user",
              "password": "StrongPass123!",
              "password_confirm": "StrongPass123!"
            }')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Register R8 — incomplete payload correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── R9: Registro con nombre opcional → almacenado correctamente ─────
      - name: "Register R9 — registro con first_name y last_name (opcionales)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/register/ \
            -H "Content-Type: application/json" \
            -d '{
              "username": "named_user",
              "email": "named@ci.test",
              "password": "StrongPass123!",
              "password_confirm": "StrongPass123!",
              "first_name": "Jane",
              "last_name": "Doe"
            }')
          echo "Response: $RESPONSE"
          # Verificar en DB que los campos se guardaron
          docker compose exec -T backend python manage.py shell -c "
          from apps.users.models import User
          u = User.objects.get(username='named_user')
          assert u.first_name == 'Jane', f'first_name wrong: {u.first_name}'
          assert u.last_name  == 'Doe',  f'last_name wrong: {u.last_name}'
          print('✅ Register R9 — optional name fields stored correctly')
          "

      # ── Logs si falla ───────────────────────────────────────────────────
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

      # ── Tear down ────────────────────────────────────────────────────────
      - name: Tear down containers
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — JAMs integration tests (Docker Compose real + JWT cookies reales)
  # Flujo completo: register → login → trip → JAM → miembros → permisos
  # ───────────────────────────────────────────────────────────────────────────
  jams-tests:
    name: "🎵 JAMs Integration Tests (Docker)"
    runs-on: ubuntu-latest
    needs: [trips-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write backend .env
        run: |
          cat > backend/.env <<'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          JWT_ACCESS_MINUTES=15
          JWT_REFRESH_DAYS=7
          JWT_ACCESS_COOKIE_NAME=move_access_token
          JWT_REFRESH_COOKIE_NAME=move_refresh_token
          JWT_COOKIE_SECURE=False
          JWT_COOKIE_SAMESITE=Lax
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
          CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost
          EOF

      - name: Build and start backend container
        run: docker compose up -d --build backend

      - name: Wait for backend to be healthy
        timeout-minutes: 3
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health/ || echo "000")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "✅ Backend is up!"; break; fi
            if [ "$i" = "30" ]; then echo "❌ Never healthy"; docker compose logs backend; exit 1; fi
            sleep 5
          done

      # ── Crear usuarios de prueba ───────────────────────────────────────────
      - name: "JAMs Setup — Create jam_admin and jam_member users"
        run: |
          docker compose exec -T backend python manage.py shell -c "
          from apps.users.models import User
          for uname, email in [('jam_admin', 'jam_admin@ci.test'), ('jam_member', 'jam_member@ci.test')]:
              if not User.objects.filter(username=uname).exists():
                  User.objects.create_user(username=uname, email=email, password='ci-password-123')
                  print(f'✅ {uname} created')
              else:
                  print(f'ℹ️  {uname} already exists')
          "

      # ── JAMs J1: Login jam_admin → JWT cookie real ────────────────────────
      - name: "JAMs J1 — Login jam_admin (JWT cookie real)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"jam_admin","password":"ci-password-123"}' \
            -c /tmp/jam_admin_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['user']['username'] == 'jam_admin', f'Login failed: {d}'
          print('✅ jam_admin login OK')
          "
          grep -q "move_access_token" /tmp/jam_admin_cookies.txt && echo "✅ Access cookie set"
          grep -q "HttpOnly" /tmp/jam_admin_cookies.txt && echo "✅ Cookie is HttpOnly"

      # ── JAMs J2: Login jam_member ─────────────────────────────────────────
      - name: "JAMs J2 — Login jam_member (JWT cookie real)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login/ \
            -H "Content-Type: application/json" \
            -d '{"login":"jam_member","password":"ci-password-123"}' \
            -c /tmp/jam_member_cookies.txt)
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['user']['username'] == 'jam_member', f'Login failed: {d}'
          print('✅ jam_member login OK')
          "

      # ── Obtener PK del jam_member para usarlo más adelante ────────────────
      - name: "JAMs Setup — Resolve jam_member PK"
        run: |
          JAM_MEMBER_PK=$(docker compose exec -T backend python manage.py shell -c "
          from apps.users.models import User
          print(User.objects.get(username='jam_member').pk)
          ")
          echo "JAM_MEMBER_PK=$JAM_MEMBER_PK" >> $GITHUB_ENV
          echo "✅ jam_member PK = $JAM_MEMBER_PK"

      # ── JAMs J3: Crear trip como jam_admin ────────────────────────────────
      - name: "JAMs J3 — POST /api/trips/ (crear trip con jam_member como participante)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/trips/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_admin_cookies.txt \
            -d "{\"name\":\"JAM CI Trip\",\"description\":\"Trip for JAM CI test\",\"participant_ids\":[$JAM_MEMBER_PK]}")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['organizer'] == 'jam_admin', f'Wrong organizer: {d}'
          assert 'jam_member' in d['participants'], f'Member missing: {d}'
          print(f\"✅ Trip created — id={d['id']}\")
          with open('/tmp/jam_trip_id.txt', 'w') as f: f.write(str(d['id']))
          "

      - name: "JAMs Setup — Store trip ID in env"
        run: |
          JAM_TRIP_ID=$(cat /tmp/jam_trip_id.txt)
          echo "JAM_TRIP_ID=$JAM_TRIP_ID" >> $GITHUB_ENV
          echo "✅ JAM_TRIP_ID=$JAM_TRIP_ID"

      # ── JAMs J4: Crear JAM usando JWT cookie real ─────────────────────────
      - name: "JAMs J4 — POST /api/trips/{id}/jam/ (crear JAM con cookie real)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/trips/$JAM_TRIP_ID/jam/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_admin_cookies.txt \
            -d '{"name":"CI JAM","description":"Integration test JAM"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'id'         in d, f'Missing id: {d}'
          assert 'name'       in d, f'Missing name: {d}'
          assert d['name']    == 'CI JAM', f'Wrong name: {d}'
          assert 'created_by' in d, f'Missing created_by: {d}'
          assert d['created_by']['username'] == 'jam_admin', f'created_by should be jam_admin: {d}'
          print(f\"✅ JAM created — id={d['id']}, created_by={d['created_by']['username']}\")
          with open('/tmp/jam_id.txt', 'w') as f: f.write(str(d['id']))
          "

      - name: "JAMs Setup — Store JAM ID in env"
        run: |
          JAM_ID=$(cat /tmp/jam_id.txt)
          echo "JAM_ID=$JAM_ID" >> $GITHUB_ENV
          echo "✅ JAM_ID=$JAM_ID"

      # ── JAMs J5: Verificar que jam_admin es admin activo automáticamente ──
      - name: "JAMs J5 — GET /api/jams/{id}/members/ (admin auto-asignado)"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/jams/$JAM_ID/members/ \
            -b /tmp/jam_admin_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          members = json.load(sys.stdin)
          assert len(members) == 1, f'Expected 1 member (creator), got {len(members)}: {members}'
          m = members[0]
          assert m['user']['username'] == 'jam_admin', f'Wrong member: {m}'
          assert m['role']   == 'admin',  f'Creator should be admin, got: {m[\"role\"]}'
          assert m['status'] == 'active', f'Creator should be active, got: {m[\"status\"]}'
          print('✅ Creator auto-assigned as active admin')
          "

      # ── JAMs J6: Duplicar JAM → 400 ───────────────────────────────────────
      - name: "JAMs J6 — POST /api/trips/{id}/jam/ segunda vez → 400"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/trips/$JAM_TRIP_ID/jam/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_admin_cookies.txt \
            -d '{"name":"Duplicate JAM"}')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Duplicate JAM correctly rejected (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── JAMs J7: Sin cookie → 401 ─────────────────────────────────────────
      - name: "JAMs J7 — GET /api/jams/{id}/ sin cookie → 401"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/jams/$JAM_ID/)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "401" ] && echo "✅ Unauthenticated correctly rejected (401)" || \
            (echo "❌ Expected 401, got $HTTP_CODE" && exit 1)

      # ── JAMs J8: jam_member fuera de JAM → 403 ───────────────────────────
      - name: "JAMs J8 — GET /api/jams/{id}/ como jam_member (fuera de JAM) → 403"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/jams/$JAM_ID/ \
            -b /tmp/jam_member_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "403" ] && echo "✅ Non-member correctly rejected (403)" || \
            (echo "❌ Expected 403, got $HTTP_CODE" && exit 1)

      # ── JAMs J9: admin agrega member ──────────────────────────────────────
      - name: "JAMs J9 — POST /api/jams/{id}/members/ (admin agrega jam_member)"
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/jams/$JAM_ID/members/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_admin_cookies.txt \
            -d "{\"user_id\":$JAM_MEMBER_PK,\"role\":\"member\"}")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['user']['username'] == 'jam_member', f'Wrong user: {d}'
          assert d['role']   == 'member', f'Wrong role: {d}'
          assert d['status'] == 'active', f'Wrong status: {d}'
          print(f\"✅ jam_member added — membership id={d['id']}\")
          with open('/tmp/jam_membership_id.txt', 'w') as f: f.write(str(d['id']))
          "

      - name: "JAMs Setup — Store membership ID in env"
        run: |
          JAM_MEMBERSHIP_ID=$(cat /tmp/jam_membership_id.txt)
          echo "JAM_MEMBERSHIP_ID=$JAM_MEMBERSHIP_ID" >> $GITHUB_ENV
          echo "✅ JAM_MEMBERSHIP_ID=$JAM_MEMBERSHIP_ID"

      # ── JAMs J10: jam_member puede ver JAM ───────────────────────────────
      - name: "JAMs J10 — GET /api/jams/{id}/ como jam_member (ahora en JAM) → 200"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/jams/$JAM_ID/ \
            -b /tmp/jam_member_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['name'] == 'CI JAM', f'Wrong JAM: {d}'
          print('✅ jam_member can view JAM after being added')
          "

      # ── JAMs J11: jam_member puede listar miembros ────────────────────────
      - name: "JAMs J11 — GET /api/jams/{id}/members/ como jam_member → 200"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/jams/$JAM_ID/members/ \
            -b /tmp/jam_member_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          members = json.load(sys.stdin)
          assert len(members) == 2, f'Expected 2 members, got {len(members)}'
          usernames = [m['user']['username'] for m in members]
          assert 'jam_admin'  in usernames, f'Admin missing: {usernames}'
          assert 'jam_member' in usernames, f'Member missing: {usernames}'
          print('✅ jam_member can list members (2 total)')
          "

      # ── JAMs J12: jam_member NO puede editar JAM → 403 ───────────────────
      - name: "JAMs J12 — PATCH /api/jams/{id}/ como jam_member → 403"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH http://localhost:8000/api/jams/$JAM_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_member_cookies.txt \
            -d '{"name":"Hijacked"}')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "403" ] && echo "✅ Member correctly blocked from PATCH (403)" || \
            (echo "❌ Expected 403, got $HTTP_CODE" && exit 1)

      # ── JAMs J13: jam_member NO puede agregar miembros → 403 ─────────────
      - name: "JAMs J13 — POST /api/jams/{id}/members/ como jam_member → 403"
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/jams/$JAM_ID/members/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_member_cookies.txt \
            -d '{"user_id":999}')
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "403" ] && echo "✅ Member correctly blocked from adding members (403)" || \
            (echo "❌ Expected 403, got $HTTP_CODE" && exit 1)

      # ── JAMs J14: admin puede editar JAM ─────────────────────────────────
      - name: "JAMs J14 — PATCH /api/jams/{id}/ como jam_admin → 200"
        run: |
          RESPONSE=$(curl -s -X PATCH http://localhost:8000/api/jams/$JAM_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_admin_cookies.txt \
            -d '{"name":"CI JAM (edited)","description":"Updated by admin"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['name'] == 'CI JAM (edited)', f'Name not updated: {d}'
          print('✅ Admin PATCH OK — JAM name updated')
          "

      # ── JAMs J15: no se puede remover al último admin → 400 ───────────────
      - name: "JAMs J15 — DELETE último admin → 400 (guard_last_admin_or_raise)"
        run: |
          ADMIN_MEMBERSHIP_ID=$(docker compose exec -T backend python manage.py shell -c "
          from apps.jams.models import JamMember
          import os
          m = JamMember.objects.get(jam_id=$JAM_ID, user__username='jam_admin')
          print(m.pk)
          ")
          echo "Admin membership PK: $ADMIN_MEMBERSHIP_ID"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE http://localhost:8000/api/jams/$JAM_ID/members/$ADMIN_MEMBERSHIP_ID/ \
            -b /tmp/jam_admin_cookies.txt)
          echo "HTTP status: $HTTP_CODE"
          [ "$HTTP_CODE" = "400" ] && echo "✅ Last admin removal correctly blocked (400)" || \
            (echo "❌ Expected 400, got $HTTP_CODE" && exit 1)

      # ── JAMs J16: admin puede promover member a admin ─────────────────────
      - name: "JAMs J16 — PATCH member a admin → 200"
        run: |
          RESPONSE=$(curl -s -X PATCH \
            http://localhost:8000/api/jams/$JAM_ID/members/$JAM_MEMBERSHIP_ID/ \
            -H "Content-Type: application/json" \
            -b /tmp/jam_admin_cookies.txt \
            -d '{"role":"admin"}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['role'] == 'admin', f'Role not updated: {d}'
          print('✅ Member promoted to admin')
          "

      # ── JAMs J17: GET /api/trips/{id}/jam/ con cookie real ────────────────
      - name: "JAMs J17 — GET /api/trips/{id}/jam/ con JWT cookie real → 200"
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/trips/$JAM_TRIP_ID/jam/ \
            -b /tmp/jam_admin_cookies.txt)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['name'] == 'CI JAM (edited)', f'Wrong JAM: {d}'
          print('✅ JAM retrievable via trip endpoint with real JWT cookie')
          "

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Tear down containers
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — Gate: solo pasa si los cinco jobs anteriores pasaron
  # ───────────────────────────────────────────────────────────────────────────
  ci-passed:
    name: "✅ CI Passed"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, trips-tests, register-tests, jams-tests]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ Unit tests failed"; exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration tests failed"; exit 1
          fi
          if [ "${{ needs.trips-tests.result }}" != "success" ]; then
            echo "❌ Trips integration tests failed"; exit 1
          fi
          if [ "${{ needs.register-tests.result }}" != "success" ]; then
            echo "❌ Register integration tests failed"; exit 1
          fi
          if [ "${{ needs.jams-tests.result }}" != "success" ]; then
            echo "❌ JAMs integration tests failed"; exit 1
          fi
          echo "✅ All CI jobs passed — ready to merge!"
